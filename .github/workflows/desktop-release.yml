# desktop-release.yml — branded desktop release chain (fork-only; upstream
# hermes-agent has no packaged-release CI). Full docs: apps/desktop/RELEASING.md
#
# One repo ships TWO branded desktop apps (IX Agency + QuizVerse) from the
# same Hermes core — the build matrix is 2 brands x 3 OS. DESKTOP_BRAND
# selects the flavor (apps/desktop/brands/<brand>.json owns the identity).
#
# Triggers:
#   - automatically from desktop-auto-release.yml on every merge to main that
#     bumps apps/desktop/package.json version (workflow_call),
#   - push an `ix-desktop-v*` tag whose version matches
#     apps/desktop/package.json (e.g. ix-desktop-v0.17.0) — releases BOTH
#     brands at that version,
#   - or run manually (workflow_dispatch).
#
# Each job builds with electron-builder, verifies platform trust, then uploads
# to the brand's S3 prefix (s3://intelliverse-x-desktop/ix-agency/ or
# .../quizverse/): installers + per-platform channel files
# (latest.yml / latest-mac.yml / latest-linux.yml) + matching trust metadata.
# Installed apps poll their own brand's feed with electron-updater's generic
# provider (electron/ix-updater.ts) — the "Update available" button pops up
# within 4 h and installs in place.
#
# Required repo secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — IAM user
#     intelliverse-x-desktop-ci (S3 read/write on that bucket only).
# Required for public macOS signing + notarization:
#   CSC_LINK / CSC_KEY_PASSWORD — Developer ID cert (base64 .p12 / password)
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — notarytool
# Required for public Windows Authenticode signing:
#   WINDOWS_CSC_LINK / WINDOWS_CSC_KEY_PASSWORD — code-signing cert
# The release job fails closed when either platform's signing credentials are
# absent. Unsigned macOS/Windows installers must never reach the public feed.
name: desktop-release

on:
  push:
    tags: ["ix-desktop-v*"]
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
        brand: [ix-agency, quizverse]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    env:
      DESKTOP_BRAND: ${{ matrix.brand }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux packaging deps (rpm for the rpm target)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Guard — tag version must match apps/desktop/package.json
        if: startsWith(github.ref, 'refs/tags/ix-desktop-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ix-desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME is v$TAG_VERSION but apps/desktop is v$PKG_VERSION" >&2
            exit 1
          fi

      - run: npm ci

      - name: Typecheck + brand unit tests
        working-directory: apps/desktop
        run: |
          npx tsc -p . --noEmit
          npx tsx --test electron/ix-updater.test.ts electron/ix-status.test.ts electron/qv-deeptutor.test.ts

      - name: Build renderer + electron bundles
        working-directory: apps/desktop
        run: npm run build

      - name: Assert brand separation in the built bundles
        working-directory: apps/desktop
        run: node scripts/check-brand-separation.mjs

      - name: Package + publish to S3 feed
        working-directory: apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          MAC_CSC_LINK: ${{ secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            for v in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
              if [ -z "${!v:-}" ]; then
                echo "Refusing to publish unsigned/unnotarized macOS installers: missing $v" >&2
                exit 1
              fi
            done
            export CSC_LINK="$MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          elif [ "$RUNNER_OS" = "Windows" ]; then
            for v in WINDOWS_CSC_LINK WINDOWS_CSC_KEY_PASSWORD; do
              if [ -z "${!v:-}" ]; then
                echo "Refusing to publish unsigned Windows installers: missing $v" >&2
                exit 1
              fi
            done
            export CSC_LINK="$WINDOWS_CSC_LINK"
            export CSC_KEY_PASSWORD="$WINDOWS_CSC_KEY_PASSWORD"
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          else
            unset CSC_LINK CSC_KEY_PASSWORD CSC_IDENTITY_AUTO_DISCOVERY
          fi
          for v in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD WINDOWS_CSC_LINK WINDOWS_CSC_KEY_PASSWORD; do
            if [ -z "${!v:-}" ]; then unset "$v"; fi
          done
          # Build locally first. Nothing reaches the public feed until the
          # platform trust checks below succeed.
          npm run builder -- --publish never

          VERSION="$(node -p "require('./package.json').version")"
          PRODUCT_NAME="$(node -p "require('./brands/${DESKTOP_BRAND}.json').productName")"
          if [ "$RUNNER_OS" = "macOS" ]; then
            TRUST_OS=mac
            VERIFIED_APP=false
            for app in release/mac*/"$PRODUCT_NAME.app"; do
              [ -d "$app" ] || continue
              codesign --verify --deep --strict --verbose=2 "$app"
              xcrun stapler validate "$app"
              spctl --assess --type execute --verbose=2 "$app"
              VERIFIED_APP=true
            done
            [ "$VERIFIED_APP" = "true" ] || { echo "No signed macOS app bundle found" >&2; exit 1; }
            for dmg in release/*.dmg; do
              [ -f "$dmg" ] || continue
              spctl --assess --type install --verbose=2 "$dmg"
            done
          elif [ "$RUNNER_OS" = "Windows" ]; then
            TRUST_OS=win
            powershell -NoProfile -Command '$files = Get-ChildItem release -File | Where-Object { $_.Extension -in ".exe", ".msi" }; if (-not $files) { throw "No Windows installers found" }; foreach ($file in $files) { $sig = Get-AuthenticodeSignature $file.FullName; if ($sig.Status -ne "Valid") { throw "$($file.Name) signature is $($sig.Status)" }; if ($sig.SignerCertificate.Subject -notmatch "Intelliverse") { throw "$($file.Name) publisher is not Intelliverse X" } }'
          else
            TRUST_OS=linux
          fi

          TRUST_OS="$TRUST_OS" VERSION="$VERSION" PRODUCT_NAME="$PRODUCT_NAME" node -e '
            const fs = require("node:fs");
            fs.writeFileSync(
              `release/trust-${process.env.TRUST_OS}.json`,
              JSON.stringify({
                version: process.env.VERSION,
                verified: true,
                publisher: "Intelliverse X",
                commit: process.env.GITHUB_SHA,
                generatedAt: new Date().toISOString()
              }, null, 2) + "\n"
            );
          '
          aws s3 cp release/ "s3://intelliverse-x-desktop/${DESKTOP_BRAND}/" \
            --recursive \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.exe" \
            --include "*.msi" \
            --include "*.AppImage" \
            --include "*.deb" \
            --include "*.rpm" \
            --include "*.blockmap" \
            --include "latest*.yml" \
            --include "trust-${TRUST_OS}.json"

      - name: Upload installers as workflow artifacts (debug/QA convenience)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.brand }}-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/latest*.yml
          if-no-files-found: warn

  # Publish the download landing page to the bucket root on every release.
  # The page fetches ix-agency/latest-*.yml at runtime so it always shows the
  # newest version without republishing — this step just makes sure edits to
  # apps/desktop/download-site/index.html ship automatically too.
  publish-download-page:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload download-site/index.html to s3://intelliverse-x-desktop/index.html
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp apps/desktop/download-site/index.html s3://intelliverse-x-desktop/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache"
          curl -sf https://intelliverse-x-desktop.s3.amazonaws.com/index.html >/dev/null

  # End-to-end feed check: after all platforms publish, confirm each brand's
  # public S3 feed serves the new version on every channel and every artifact
  # it references is downloadable with the exact size the channel file records.
  verify-feed:
    needs: build-publish
    strategy:
      fail-fast: false
      matrix:
        brand: [ix-agency, quizverse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify the ${{ matrix.brand }} update feed serves this version
        env:
          DESKTOP_BRAND: ${{ matrix.brand }}
        run: |
          EXPECT_VERSION="$(node -p "require('./apps/desktop/package.json').version")" \
            node apps/desktop/scripts/verify-update-feed.mjs
