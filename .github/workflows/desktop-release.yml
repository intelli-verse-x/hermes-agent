# desktop-release.yml — IX Agency desktop release chain (fork-only; upstream
# hermes-agent has no packaged-release CI). Full docs: apps/desktop/RELEASING.md
#
# Triggers:
#   - automatically from desktop-auto-release.yml on every merge to main that
#     bumps apps/desktop/package.json version (workflow_call),
#   - push an `ix-desktop-v*` tag whose version matches
#     apps/desktop/package.json (e.g. ix-desktop-v0.17.0),
#   - or run manually (workflow_dispatch).
#
# Each platform job builds with electron-builder and publishes DIRECTLY to
# s3://intelliverse-x-desktop/ix-agency/ (package.json > build.publish):
# installers + per-platform channel files (latest.yml / latest-mac.yml /
# latest-linux.yml). Installed apps poll that feed with electron-updater's
# generic provider (electron/ix-updater.ts) — the "Update available" button
# pops up within 4 h and installs in place.
#
# Required repo secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — IAM user
#     intelliverse-x-desktop-ci (S3 read/write on that bucket only).
# Optional (macOS signing + notarization; unsigned builds still publish, but
# mac in-place auto-update needs a signed app — unsigned falls back to
# opening the .dmg URL):
#   CSC_LINK / CSC_KEY_PASSWORD — Developer ID cert (base64 .p12 / password)
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — notarytool
# Optional (Windows signing via Azure Trusted Signing; skipped when unset —
# electron-builder invokes Invoke-TrustedSigning for the exe + installers,
# no cert file or hardware token, SmartScreen trust is immediate):
#   AZURE_SIGNING_ENDPOINT — regional endpoint, e.g. https://eus.codesigning.azure.net/
#   AZURE_SIGNING_ACCOUNT — Trusted Signing account name (gates the whole feature)
#   AZURE_SIGNING_PROFILE — certificate profile name (type: Public Trust)
#   AZURE_PUBLISHER_NAME — the identity-validated legal name (certificate CN)
#   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET — Entra app
#     registration whose service principal has the role
#     "Trusted Signing Certificate Profile Signer" on the account
name: desktop-release

on:
  push:
    tags: ["ix-desktop-v*"]
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux packaging deps (rpm for the rpm target)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Guard — tag version must match apps/desktop/package.json
        if: startsWith(github.ref, 'refs/tags/ix-desktop-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ix-desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME is v$TAG_VERSION but apps/desktop is v$PKG_VERSION" >&2
            exit 1
          fi

      - run: npm ci

      - name: Typecheck + IX unit tests
        working-directory: apps/desktop
        run: |
          npx tsc -p . --noEmit
          npx tsx --test electron/ix-updater.test.ts electron/ix-status.test.ts

      - name: Build renderer + electron bundles
        working-directory: apps/desktop
        run: npm run build

      - name: Package + publish to S3 feed
        working-directory: apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          # macOS signing/notarization (skipped when unset; CSC_IDENTITY_AUTO_DISCOVERY
          # avoids electron-builder hunting a keychain identity that isn't there).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # Windows / Azure Trusted Signing (consumed by electron-builder's
          # azureSignOptions path; all skipped when AZURE_SIGNING_ACCOUNT unset)
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
          AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        # Unset EMPTY signing vars: electron-builder treats an empty CSC_LINK
        # as a certificate *path* and dies with "<cwd> not a file".
        run: |
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v:-}" ]; then unset "$v"; fi
          done
          # Azure Trusted Signing: injected as CLI config overrides so the
          # checked-in package.json stays free of account-specific values and
          # builds stay unsigned until the secrets exist. signAndEditExecutable
          # is re-enabled here because signing requires editing the exe.
          EXTRA_ARGS=()
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "${AZURE_SIGNING_ACCOUNT:-}" ]; then
            EXTRA_ARGS+=(
              "--config.win.signAndEditExecutable=true"
              "--config.win.azureSignOptions.endpoint=${AZURE_SIGNING_ENDPOINT}"
              "--config.win.azureSignOptions.codeSigningAccountName=${AZURE_SIGNING_ACCOUNT}"
              "--config.win.azureSignOptions.certificateProfileName=${AZURE_SIGNING_PROFILE}"
              "--config.win.azureSignOptions.publisherName=${AZURE_PUBLISHER_NAME}"
            )
          fi
          npm run builder -- --publish always ${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}

      - name: Upload installers as workflow artifacts (debug/QA convenience)
        uses: actions/upload-artifact@v4
        with:
          name: ix-agency-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/latest*.yml
          if-no-files-found: warn

  # Publish the download landing page to the bucket root on every release.
  # The page fetches ix-agency/latest-*.yml at runtime so it always shows the
  # newest version without republishing — this step just makes sure edits to
  # apps/desktop/download-site/index.html ship automatically too.
  publish-download-page:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload download-site/index.html to s3://intelliverse-x-desktop/index.html
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp apps/desktop/download-site/index.html s3://intelliverse-x-desktop/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache"
          curl -sf https://intelliverse-x-desktop.s3.amazonaws.com/index.html >/dev/null

  # End-to-end feed check: after all 3 platforms publish, confirm the public
  # S3 feed serves the new version on every channel and every artifact it
  # references is downloadable with the exact size the channel file records.
  verify-feed:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify public update feed serves this version
        run: |
          EXPECT_VERSION="$(node -p "require('./apps/desktop/package.json').version")" \
            node apps/desktop/scripts/verify-update-feed.mjs
