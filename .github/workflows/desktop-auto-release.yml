# desktop-auto-release.yml — publish the branded desktop apps automatically
# on merge. Full docs: apps/desktop/RELEASING.md
#
# On every push (merge) to main that touches apps/desktop or the desktop
# workflows, this decides whether a release is needed:
#   - reads the version in apps/desktop/package.json,
#   - skips only if EVERY brand's public S3 feed (ix-agency/ AND quizverse/)
#     already serves that version (so ordinary merges that don't bump the
#     version are no-ops, and a brand that missed a release catches up),
#   - otherwise runs the full desktop-release build+publish chain (2 brands
#     x 3 OS -> s3://intelliverse-x-desktop/<brand>/) and then tags the
#     commit ix-desktop-v<version> for traceability.
#
# So shipping an update is just: bump "version" in apps/desktop/package.json,
# merge to main. Installed apps see the update button within 4 hours.
name: desktop-auto-release

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-release.yml"
      - ".github/workflows/desktop-auto-release.yml"

permissions:
  contents: write # to push the ix-desktop-v<version> tag after publishing

concurrency:
  group: desktop-auto-release
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare package.json version with every brand's live S3 feed
        id: check
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          RELEASE=false
          for BRAND in ix-agency quizverse; do
            LIVE="$(curl -sf "https://intelliverse-x-desktop.s3.amazonaws.com/$BRAND/latest-mac.yml" \
              | awk '/^version:/ {print $2; exit}' || true)"
            echo "brand=$BRAND package.json=$VERSION live-feed=${LIVE:-<none>}"
            if [ "$VERSION" != "$LIVE" ]; then
              RELEASE=true
              echo "Brand $BRAND needs v$VERSION (feed has ${LIVE:-nothing})."
            fi
          done
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          if [ "$RELEASE" = "false" ]; then
            echo "Every brand feed already serves v$VERSION — nothing to release."
          fi

  release:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    uses: ./.github/workflows/desktop-release.yml
    secrets: inherit

  tag:
    needs: [decide, release]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag the released commit ix-desktop-v<version>
        run: |
          TAG="ix-desktop-v${{ needs.decide.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "$TAG already exists — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
