name: Desktop download page

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/download-site/index.html"
      - ".github/workflows/desktop-download-page.yml"
  workflow_dispatch: {}

concurrency:
  group: desktop-download-page
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Enforce fail-closed source
        run: |
          ! grep -Eiq 'xattr -cr|run anyway|open anyway|IVX Admin Desktop' \
            apps/desktop/download-site/index.html
          grep -Fq 'trust.schemaVersion === 1' apps/desktop/download-site/index.html
          grep -Fq 'Pending release trust verification' apps/desktop/download-site/index.html
          grep -Fq 'do not bypass Gatekeeper' apps/desktop/download-site/index.html

      - name: Deploy only the download page
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp apps/desktop/download-site/index.html \
            s3://intelliverse-x-desktop/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache"

      - name: Verify public HTTP content
        run: |
          expected="$(sha256sum apps/desktop/download-site/index.html | awk '{print $1}')"
          for attempt in 1 2 3 4 5; do
            curl --fail --location --silent --show-error \
              https://intelliverse-x-desktop.s3.amazonaws.com/index.html \
              --output /tmp/deployed-download.html
            actual="$(sha256sum /tmp/deployed-download.html | awk '{print $1}')"
            [ "$actual" = "$expected" ] && break
            sleep 2
          done
          [ "$actual" = "$expected" ]
          ! grep -Eiq 'xattr -cr|run anyway|open anyway|IVX Admin Desktop' \
            /tmp/deployed-download.html
          grep -Fq 'trust.schemaVersion === 1' /tmp/deployed-download.html
