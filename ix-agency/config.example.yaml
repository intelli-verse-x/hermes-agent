# =============================================================================
# IX Agency — org config overlay for Hermes Agent
# =============================================================================
# Copy the keys you need into ~/.hermes/config.yaml (or merge this file into
# an existing one). Everything here layers on top of the stock
# cli-config.yaml.example defaults; only IX-specific settings are listed.
#
# Secrets (API keys, tokens) belong in ~/.hermes/.env — see .env.example at
# the repo root, including FIRECRAWL_API_URL for the self-hosted instance.

# -----------------------------------------------------------------------------
# Web research through Firecrawl
# -----------------------------------------------------------------------------
# Pins both web_search and web_extract to the Firecrawl provider (the bundled
# plugins/web/firecrawl plugin). The org currently uses Firecrawl CLOUD with
# the shared fc- key (FIRECRAWL_API_KEY in ~/.hermes/.env — same key the rest
# of the org tooling uses). No self-hosted instance is deployed yet (verified
# 2026-07-09: no firecrawl ingress/service in intelli-verse-kube-infra); when
# one lands, set FIRECRAWL_API_URL in ~/.hermes/.env and the same plugin and
# MCP server route to it instead — no config change needed here.
web:
  backend: firecrawl

# -----------------------------------------------------------------------------
# MCP servers
# -----------------------------------------------------------------------------
# firecrawl-mcp-server (MIT) exposes search/scrape/crawl/extract as MCP tools.
# This complements the native web toolset with crawl and deep-research tools,
# and is what external MCP clients (Cursor, Claude Code) should also use.
# Verified: the server starts with either env var; with only FIRECRAWL_API_URL
# set it targets the self-hosted instance (no cloud key required).
mcp_servers:
  firecrawl:
    command: npx
    args: ["-y", "firecrawl-mcp"]
    env:
      # Cloud (current org default):
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
      # Self-hosted (once deployed — key then optional):
      # FIRECRAWL_API_URL: "https://firecrawl.intelli-verse-x.ai"

# -----------------------------------------------------------------------------
# Dashboard behind the company VPN (remote IX Agency backends)
# -----------------------------------------------------------------------------
# For a backend that desktop clients reach over the org VPN (usa-vpn —
# WireGuard/wg-easy on Lightsail; connect via the desktop's IX Agency →
# Connect tab), pin a session token in ~/.hermes/.env
# (HERMES_DASHBOARD_SESSION_TOKEN) so desktop Remote Gateway connections
# survive restarts. Keep the port behind Cloudflare Access or an IP
# allowlist pinned to the VPN exit IP (3.224.15.124) — never expose it to
# the open internet. See ix-agency/README.md → "VPN".
#
# Start with:  hermes dashboard --host 0.0.0.0 --port 9119 --insecure --tui --no-open
#
# dashboard:
#   public_url: "https://hermes.intelli-verse-x.ai"
