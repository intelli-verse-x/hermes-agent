<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 128" width="440" height="128" role="img" aria-label="IX Agency by Intelliverse X">
  <!-- Horizontal lockup, light backgrounds. Palette from intelli-verse-x.ai. -->
  <defs>
    <linearGradient id="ixl-i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3E8F"/>
    </linearGradient>
    <linearGradient id="ixl-x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D96EA"/>
      <stop offset="1" stop-color="#1E3E8F"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <g>
    <rect x="14" y="26" width="18" height="76" rx="9" fill="url(#ixl-i)"/>
    <path d="M50 28 L110 100" stroke="url(#ixl-x)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M50 100 L69.8 76.3" stroke="#38BDF8" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M90.2 51.7 L110 28" stroke="#38BDF8" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>
  <!-- wordmark -->
  <text x="140" y="76" font-family="'Avenir Next','Helvetica Neue',Helvetica,'Segoe UI',Arial,sans-serif"
        font-size="52" font-weight="700" fill="#16181D" letter-spacing="0.5">IX<tspan font-weight="400" dx="12">Agency</tspan></text>
  <text x="142" y="104" font-family="'Avenir Next','Helvetica Neue',Helvetica,'Segoe UI',Arial,sans-serif"
        font-size="17" font-weight="600" fill="#0D96EA" letter-spacing="5.5">INTELLIVERSE X</text>
</svg>
